name: Latest DEV.to Posts
on: 
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs: 
  update-readme: 
    name: Update this repo's README with latest blog posts
    runs-on: ubuntu-latest
    steps: 
      - name: Checkout
        uses: actions/checkout@v3
      - name: Pull RSS feed
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          max_post_count: "4"
          feed_list: "https://dev.to/feed/rn-ops"
